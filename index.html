---
layout: default
title: ホーム
---

<h1>relagarden</h1>
<p>ようこそ。ここは relagarden のサンプルサイトです。</p>

<section id="top-works">
  <h2>施工事例</h2>
  <div class="works-grid">
    {% for work in site.cases %}
      <article class="work-item">
        <a href="{{ work.url | relative_url }}">
          <img src="{{ work.thumbnail | default: '/assets/images/works/default-thumb.jpg' }}" alt="{{ work.title }} サムネイル">
          <h3>{{ work.title }}</h3>
        </a>
        {% if work.excerpt %}
          <p class="work-excerpt">{{ work.excerpt }}</p>
        {% endif %}
      </article>
    {% endfor %}
  </div>
</section>

<section id="contact">
  <h2>お問い合わせ</h2>
  <p>簡易フォームは外部サービスを利用するか、Rails API と連携します。</p>
</section>
