---
layout: default
---

<article class="work">
  <header class="work-header">
    <h1 class="work-title">{{ page.title }}</h1>
    <p class="work-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% if page.categories %}・カテゴリ: {{ page.categories | join: " / " }}{% endif %}
    </p>
    {% if page.thumbnail %}
      <figure class="work-thumb">
        <img src="{{ page.thumbnail }}" alt="{{ page.title }} サムネイル">
      </figure>
    {% endif %}
  </header>

  <section class="work-body">
    {{ content }}
  </section>

  <footer class="work-footer">
    {% if page.excerpt %}
      <p class="work-excerpt">{{ page.excerpt }}</p>
    {% endif %}
    <p><a href="{{ site.baseurl }}/">← トップへ戻る</a></p>
  </footer>
</article>
