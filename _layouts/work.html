---
layout: default
---

<section class="cases-list">
  <h1>施工事例一覧</h1>

  <div class="cases-grid">
    {% assign sorted_cases = site.cases | sort: "date" | reverse %}
    {% for case in sorted_cases %}
      <article class="case-item">
        <a href="{{ case.url | relative_url }}">
          {% if case.thumbnail %}
            <img src="{{ case.thumbnail | relative_url }}" alt="{{ case.title }} サムネイル">
          {% endif %}
          <h2>{{ case.title }}</h2>
        </a>

        {% if case.excerpt %}
          <p class="case-excerpt">{{ case.excerpt }}</p>
        {% endif %}
      </article>
    {% endfor %}
  </div>
</section>
